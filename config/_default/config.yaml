baseURL: /
languageCode: "pl"
title: Jazzymentary
theme: eclectic-hugo-theme
disablePathToLower: false
googleAnalytics: G-G27JERXRML
Paginate: 3
minify: false

enableEmoji: true

#permalinks:
#  blog: "/blog/:year/:month/:day/:slug"
Paginate: 9

sitemap:
    changefreq: "monthly"
    priority: 0.5
    filename: "sitemap.xml"
outputs:
  home:
  - html
  - rss
  - json
canonifyURLs: true
markup:
  renderer:
    hardWraps: true
  highlight:
    lineNos: true
#enableGitInfo: true
